<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor XML NF-e → Excel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body { background:#0f172a; color:#e5e7eb; }
    .card { background:#020617; border-radius:14px; border:none; }
    table { font-size:.9rem; }
    .status-autorizada { color:#22c55e; font-weight:bold; }
    .status-cancelada { color:#ef4444; font-weight:bold; }
    .status-inutilizada { color:#facc15; font-weight:bold; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="card p-4 shadow">
    <h3 class="mb-4">📄 Conversor XML NF-e → Excel</h3>

    <input type="file" id="xmlFiles" class="form-control mb-3" multiple accept=".xml">

    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-primary" onclick="processarXML()">Processar XML</button>
      <button class="btn btn-success" onclick="exportarExcel()">Exportar Excel</button>
    </div>

    <div class="table-responsive">
      <table class="table table-dark table-striped">
        <thead>
          <tr>
            <th>Data Emissão</th>
            <th>Natureza da Operação</th>
            <th>Nº Nota</th>
            <th>Emitente</th>
            <th>Destinatário</th>
            <th>Produto</th>
            <th>CFOP</th>
            <th>Quantidade</th>
            <th>Valor Unitário</th>
            <th>Valor Produto</th>
            <th>Valor Total NF</th>
            <th>Chave de Acesso</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabelaDados"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let dados = [];
let processados = 0;
let total = 0;

function processarXML() {
  const files = document.getElementById('xmlFiles').files;
  if (!files.length) return alert('Selecione os XMLs');

  dados = [];
  processados = 0;
  total = files.length;
  document.getElementById('tabelaDados').innerHTML = '';

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => tratarXML(e.target.result);
    reader.readAsText(file);
  });
}

function tratarXML(xmlTexto) {
  const xml = new DOMParser().parseFromString(xmlTexto, "text/xml");

  // ===============================
  // NF-e AUTORIZADA
  // ===============================
  if (xml.querySelector('infNFe')) {
    const infNFe = xml.querySelector('infNFe');

    const chave   = infNFe.getAttribute('Id')?.replace('NFe','') || '';
    const numero  = xml.querySelector('nNF')?.textContent || '';
    const data    = xml.querySelector('dhEmi, dEmi')?.textContent || '';
    const natOp   = xml.querySelector('ide natOp')?.textContent || '';
    const dest    = xml.querySelector('dest xNome')?.textContent || '';
    const emit    = xml.querySelector('emit xNome')?.textContent || '';
    const valorNF = xml.querySelector('vNF')?.textContent || '0';

    xml.querySelectorAll('det').forEach(det => {
      const prod = det.querySelector('prod');

      const xProd  = prod?.querySelector('xProd')?.textContent || '';
      const cfop   = prod?.querySelector('CFOP')?.textContent || '';
      const qCom   = prod?.querySelector('qCom')?.textContent || '0';
      const vUnCom = prod?.querySelector('vUnCom')?.textContent || '0';
      const vProd  = prod?.querySelector('vProd')?.textContent || '0';

      adicionar({
        data,
        natOp,
        numero,
        emit,
        dest,
        produto: xProd,
        cfop,
        quantidade: qCom,
        valorUnitario: vUnCom,
        valorProduto: vProd,
        valorNF,
        chave,
        status: 'Autorizada',
        classe: 'status-autorizada'
      });
    });
  }

  // ===============================
  // NF-e CANCELADA
  // ===============================
  else if (xml.querySelector('procCancNFe')) {
    const inf = xml.querySelector('infCanc');
    const chave = inf?.querySelector('chNFe')?.textContent || '';
    const data = inf?.querySelector('dhRecbto')?.textContent || '';

    adicionar({
      data,
      natOp: '—',
      emit: '—',
      dest: '—',
      numero: '—',
      produto: '—',
      cfop: '—',
      quantidade: 0,
      valorUnitario: 0,
      valorProduto: 0,
      valorNF: 0,
      chave,
      status: 'Cancelada',
      classe: 'status-cancelada'
    });
  }

  // ===============================
  // NF-e INUTILIZADA
  // ===============================
  else if (xml.querySelector('inutNFe')) {
    const inf = xml.querySelector('infInut');
    const data = inf?.querySelector('dhRecbto')?.textContent || '';
    const ini = inf?.querySelector('nNFIni')?.textContent || '';
    const fim = inf?.querySelector('nNFFin')?.textContent || '';
    const serie = inf?.querySelector('serie')?.textContent || '';

    adicionar({
      data,
      natOp: '—',
      emit: '—',
      dest: '—',
      numero: `Série ${serie} (${ini} a ${fim})`,
      produto: '—',
      cfop: '—',
      quantidade: 0,
      valorUnitario: 0,
      valorProduto: 0,
      valorNF: 0,
      chave: '—',
      status: 'Inutilizada',
      classe: 'status-inutilizada'
    });
  }

  processados++;
}

function adicionar(item) {
  dados.push({
    'Data Emissão': item.data,
    'Natureza Operação': item.natOp,
    'Número Nota': item.numero,
    'Emitente': item.emit,
    'Destinatário': item.dest,
    'Produto': item.produto,
    'CFOP': item.cfop,
    'Quantidade': parseFloat(item.quantidade),
    'Valor Unitário': parseFloat(item.valorUnitario),
    'Valor Produto': parseFloat(item.valorProduto),
    'Valor Total NF': parseFloat(item.valorNF),
    'Chave Acesso': item.chave,
    'Status': item.status
  });

  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${item.data}</td>
    <td>${item.natOp}</td>
    <td>${item.numero}</td>
    <td>${item.emit}</td>
    <td>${item.dest}</td>
    <td>${item.produto}</td>
    <td>${item.cfop}</td>
    <td>${parseFloat(item.quantidade)}</td>
    <td>R$ ${parseFloat(item.valorUnitario).toFixed(2)}</td>
    <td>R$ ${parseFloat(item.valorProduto).toFixed(2)}</td>
    <td>R$ ${parseFloat(item.valorNF).toFixed(2)}</td>
    <td>${item.chave}</td>
    <td class="${item.classe}">${item.status}</td>
  `;
  document.getElementById('tabelaDados').appendChild(tr);
}

function exportarExcel() {
  if (processados < total) {
    alert('Aguarde o processamento de todos os XMLs.');
    return;
  }
  if (!dados.length) return alert('Nada para exportar');

  const ws = XLSX.utils.json_to_sheet(dados);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'NF-e');

  XLSX.writeFile(wb, 'nfe_export.xlsx');
}
</script>

</body>
</html>
